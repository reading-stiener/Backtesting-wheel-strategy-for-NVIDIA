
<div style="padding: 1rem 0; font-family: var(--font-sans);">

  <div style="display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap;">
    <button onclick="setPhase('put')" id="btn-put" style="padding: 6px 16px; font-size: 13px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: #378ADD; color: #fff; cursor: pointer;">Cash-secured put</button>
    <button onclick="setPhase('call')" id="btn-call" style="padding: 6px 16px; font-size: 13px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer;">Covered call</button>
    <button onclick="setPhase('both')" id="btn-both" style="padding: 6px 16px; font-size: 13px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer;">Full cycle</button>
  </div>

  <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 12px;">
    <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem;">
      <div style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px;">Put strike</div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <input type="range" id="strike" min="80" max="120" value="100" step="1" style="flex:1;" oninput="update()">
        <span id="strike-out" style="font-size: 14px; font-weight: 500; min-width: 36px;">$100</span>
      </div>
    </div>
    <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem;">
      <div style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px;">Put premium</div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <input type="range" id="putPrem" min="1" max="15" value="5" step="1" style="flex:1;" oninput="update()">
        <span id="putPrem-out" style="font-size: 14px; font-weight: 500; min-width: 28px;">$5</span>
      </div>
    </div>
    <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem;">
      <div style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px;">Call strike</div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <input type="range" id="callStrike" min="80" max="125" value="100" step="1" style="flex:1;" oninput="update()">
        <span id="callStrike-out" style="font-size: 14px; font-weight: 500; min-width: 36px;">$100</span>
      </div>
    </div>
    <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem;">
      <div style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px;">Call premium</div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <input type="range" id="callPrem" min="1" max="15" value="4" step="1" style="flex:1;" oninput="update()">
        <span id="callPrem-out" style="font-size: 14px; font-weight: 500; min-width: 28px;">$4</span>
      </div>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem;" id="stats"></div>

  <div style="position: relative; width: 100%; height: 340px;">
    <canvas id="payoffChart"></canvas>
  </div>

  <div style="display: flex; flex-wrap: wrap; gap: 16px; margin-top: 1rem; font-size: 12px; color: var(--color-text-secondary);" id="legend"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let chart;
let phase = 'put';

function setPhase(p) {
  phase = p;
  ['put','call','both'].forEach(id => {
    const btn = document.getElementById('btn-' + id);
    btn.style.background = id === p ? '#378ADD' : 'var(--color-background-primary)';
    btn.style.color = id === p ? '#fff' : 'var(--color-text-primary)';
  });
  update();
}

function statCard(label, value, color) {
  return `<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem;">
    <div style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px;">${label}</div>
    <div style="font-size: 16px; font-weight: 500; color: ${color};">${value}</div>
  </div>`;
}

function update() {
  const strike = parseInt(document.getElementById('strike').value);
  const putPrem = parseInt(document.getElementById('putPrem').value);
  const callStrike = parseInt(document.getElementById('callStrike').value);
  const callPrem = parseInt(document.getElementById('callPrem').value);

  document.getElementById('strike-out').textContent = '$' + strike;
  document.getElementById('putPrem-out').textContent = '$' + putPrem;
  document.getElementById('callStrike-out').textContent = '$' + callStrike;
  document.getElementById('callPrem-out').textContent = '$' + callPrem;

  const costBasis = strike - putPrem;
  const putBreakeven = strike - putPrem;
  const callCap = callStrike + callPrem;
  const cycleMax = putPrem + callPrem;

  const minP = Math.floor((Math.min(strike, callStrike) - 30) / 5) * 5;
  const maxP = Math.ceil((Math.max(strike, callStrike) + 30) / 5) * 5;

  const prices = [];
  for (let p = minP; p <= maxP; p++) prices.push(p);

  const putPnl = prices.map(p => p >= strike ? putPrem : putPrem - (strike - p));
  const callPnl = prices.map(p => {
    const stockGain = p - costBasis;
    const callLoss = p > callStrike ? -(p - callStrike) : 0;
    return stockGain + callPrem + callLoss;
  });
  const cyclePnl = prices.map(p => p >= strike ? cycleMax : putPrem - (strike - p));

  const datasets = [];
  if (phase === 'put' || phase === 'both') {
    datasets.push({
      label: 'Cash-secured put',
      data: putPnl,
      borderColor: '#378ADD',
      backgroundColor: 'rgba(55,138,221,0.07)',
      borderWidth: 2.5, pointRadius: 0, fill: true, tension: 0,
    });
  }
  if (phase === 'call' || phase === 'both') {
    datasets.push({
      label: 'Covered call (post-assignment)',
      data: callPnl,
      borderColor: '#1D9E75',
      backgroundColor: 'rgba(29,158,117,0.07)',
      borderWidth: 2.5, pointRadius: 0, fill: true, tension: 0,
    });
  }
  if (phase === 'both') {
    datasets.push({
      label: 'Full cycle combined',
      data: cyclePnl,
      borderColor: '#BA7517',
      backgroundColor: 'transparent',
      borderWidth: 2, borderDash: [6,3], pointRadius: 0, fill: false, tension: 0,
    });
  }

  document.getElementById('legend').innerHTML = datasets.map(d => {
    const style = d.borderDash
      ? `width:18px;height:0;border-top:2px dashed ${d.borderColor};margin-top:5px;`
      : `width:18px;height:10px;border-radius:2px;background:${d.borderColor};`;
    return `<span style="display:flex;align-items:center;gap:6px;"><span style="${style}display:inline-block;"></span>${d.label}</span>`;
  }).join('');

  const statsEl = document.getElementById('stats');
  if (phase === 'put') {
    statsEl.innerHTML =
      statCard('Max gain', '+$' + putPrem + ' / share', '#1D9E75') +
      statCard('Breakeven', '$' + putBreakeven, '#888780') +
      statCard('Max loss', 'Stock → $0', '#E24B4A');
  } else if (phase === 'call') {
    statsEl.innerHTML =
      statCard('Cost basis', '$' + costBasis + ' / share', '#888780') +
      statCard('Upside cap', '$' + callCap + ' / share', '#1D9E75') +
      statCard('Max gain (call leg)', '+$' + (callCap - costBasis) + ' / share', '#1D9E75');
  } else {
    statsEl.innerHTML =
      statCard('Max gain (both legs)', '+$' + cycleMax + ' / share', '#1D9E75') +
      statCard('Breakeven', '$' + putBreakeven, '#888780') +
      statCard('Call vs put strike', callStrike >= strike ? '+$' + (callStrike - strike) : '-$' + (strike - callStrike), callStrike >= strike ? '#1D9E75' : '#E24B4A');
  }

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('payoffChart'), {
    type: 'line',
    data: { labels: prices, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: items => 'Stock price: $' + items[0].label,
            label: item => item.dataset.label + ': ' + (item.raw >= 0 ? '+$' : '-$') + Math.abs(Math.round(item.raw))
          }
        }
      },
      scales: {
        x: {
          ticks: {
            autoSkip: false,
            maxRotation: 0,
            callback: (v, i) => prices[i] % 5 === 0 ? '$' + prices[i] : null,
            color: '#888780',
            font: { size: 11 }
          },
          grid: {
            color: (ctx) => prices[ctx.index] % 5 === 0 ? 'rgba(136,135,128,0.2)' : 'rgba(0,0,0,0)',
          },
          title: { display: true, text: 'Stock price at expiration', color: '#888780', font: { size: 12 } }
        },
        y: {
          ticks: {
            callback: v => (v >= 0 ? '+$' : '-$') + Math.abs(v),
            color: '#888780', font: { size: 11 }
          },
          grid: {
            color: ctx => ctx.tick.value === 0 ? 'rgba(136,135,128,0.6)' : 'rgba(136,135,128,0.15)',
            lineWidth: ctx => ctx.tick.value === 0 ? 1.5 : 1
          },
          title: { display: true, text: 'P&L per share ($)', color: '#888780', font: { size: 12 } }
        }
      }
    }
  });
}

update();
</script>
